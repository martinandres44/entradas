<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA 2026 · Monitor de Tickets</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --accent: #c8ff00;
    --accent2: #00d4ff;
    --red: #ff4545;
    --text: #f0f0f0;
    --muted: #6b6b80;
    --arg: #74acdf;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(90deg,rgba(255,255,255,.015) 0,rgba(255,255,255,.015) 1px,transparent 1px,transparent 80px),
      repeating-linear-gradient(0deg,rgba(255,255,255,.015) 0,rgba(255,255,255,.015) 1px,transparent 1px,transparent 80px);
    pointer-events:none; z-index:0;
  }
  .wrap { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:2rem 1.25rem 4rem; }

  header { text-align:center; margin-bottom:3rem; padding-top:1rem; }
  .logo-row { display:flex; align-items:center; justify-content:center; gap:1rem; margin-bottom:.5rem; }
  .ball { width:40px; height:40px; background:var(--text); border-radius:50%; display:grid; place-items:center; font-size:22px; animation:spin 8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.4rem,8vw,4rem); letter-spacing:.04em; line-height:1; }
  .subtitle { font-size:.85rem; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; margin-top:.5rem; }
  .last-update { display:inline-flex; align-items:center; gap:6px; margin-top:1.2rem; font-size:.78rem; color:var(--muted); background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:4px 14px; }
  .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

  .matches { display:grid; gap:1.25rem; margin-bottom:2rem; }
  .match-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.75rem; position:relative; overflow:hidden; animation:fadeUp .5s ease both; }
  .match-card:nth-child(2) { animation-delay:.1s; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .match-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(180deg,var(--arg),var(--accent2)); border-radius:3px 0 0 3px; }
  .match-card:hover { border-color:rgba(116,172,223,.25); box-shadow:0 0 40px rgba(116,172,223,.06); transition:all .3s; }

  .match-header { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; margin-bottom:1.25rem; flex-wrap:wrap; }
  .match-title { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; letter-spacing:.03em; line-height:1.1; }
  .match-meta { font-size:.78rem; color:var(--muted); margin-top:4px; letter-spacing:.05em; }
  .match-badge { font-size:.7rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; padding:4px 12px; border-radius:100px; white-space:nowrap; }
  .badge-ok   { background:rgba(200,255,0,.12); color:var(--accent); border:1px solid rgba(200,255,0,.25); }
  .badge-warn { background:rgba(255,165,0,.12); color:#ffa500; border:1px solid rgba(255,165,0,.25); }
  .badge-none { background:rgba(107,107,128,.15); color:var(--muted); border:1px solid var(--border); }

  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:.75rem; margin-bottom:1.25rem; }
  .stat { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:.9rem 1rem; }
  .stat-label { font-size:.68rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px; }
  .stat-value { font-family:'Bebas Neue',sans-serif; font-size:1.9rem; letter-spacing:.02em; line-height:1; color:var(--accent); }
  .stat-value.blue { color:var(--accent2); }
  .stat-value.white { color:var(--text); }
  .stat-value.small { font-size:1.1rem; padding-top:4px; }
  .stat-sub { font-size:.72rem; color:var(--muted); margin-top:3px; }

  .sources-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:.6rem; margin-bottom:1.25rem; }
  .source-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:.75rem 1rem; display:flex; justify-content:space-between; align-items:center; }
  .source-name { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
  .source-price { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; color:var(--accent); }
  .source-count { font-size:.7rem; color:var(--muted); margin-top:2px; }

  .history-section { margin-top:.25rem; }
  .history-label { font-size:.7rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
  .history-list { display:flex; flex-direction:column; gap:4px; max-height:140px; overflow-y:auto; }
  .history-list::-webkit-scrollbar { width:3px; }
  .history-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .history-item { display:flex; justify-content:space-between; align-items:center; padding:5px 10px; background:var(--surface2); border-radius:6px; font-size:.78rem; gap:8px; }
  .history-time { color:var(--muted); font-size:.7rem; flex-shrink:0; }
  .history-price { font-weight:500; }
  .history-count { color:var(--muted); font-size:.7rem; }
  .dn { color:#4cff91; font-size:.7rem; }
  .up { color:var(--red); font-size:.7rem; }

  .card-footer { display:flex; gap:.75rem; margin-top:1.25rem; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap:6px; font-size:.78rem; font-weight:500; letter-spacing:.05em; text-decoration:none; padding:7px 16px; border-radius:8px; transition:all .2s; }
  .btn-primary { background:var(--accent); color:#0a0a0f; }
  .btn-primary:hover { background:#d4ff1a; }
  .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-ghost:hover { color:var(--text); border-color:rgba(255,255,255,.2); }

  .info-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.25rem 1.5rem; margin-top:1.5rem; display:flex; gap:1.5rem; flex-wrap:wrap; align-items:center; justify-content:space-between; animation:fadeUp .5s .2s both; }
  .info-item { font-size:.8rem; color:var(--muted); }
  .info-item strong { color:var(--text); display:block; font-size:.85rem; margin-bottom:2px; }

  /* Estado de carga / error */
  .status-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2.5rem; text-align:center; }
  .status-icon { font-size:2.5rem; margin-bottom:1rem; }
  .status-title { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; margin-bottom:.5rem; }
  .status-msg { font-size:.85rem; color:var(--muted); line-height:1.7; }
  .status-msg code { background:var(--surface2); padding:2px 6px; border-radius:4px; font-size:.8rem; color:var(--accent2); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-row">
      <div class="ball">⚽</div>
      <h1>FIFA 2026 Monitor</h1>
    </div>
    <p class="subtitle">Mercado secundario · Argentina Grupo J</p>
    <div class="last-update">
      <span class="dot"></span>
      <span id="upd">Cargando...</span>
    </div>
  </header>

  <div class="matches" id="root"></div>

  <div class="info-section">
    <div class="info-item"><strong>Fuentes</strong>SeatGeek · TickPick · Gametime</div>
    <div class="info-item"><strong>Frecuencia</strong>Cada 15 min via GitHub Actions</div>
    <div class="info-item"><strong>Alertas</strong>Telegram si precio cambia ±$50/$100</div>
    <div class="info-item"><strong>Nota</strong>USD · Mercado secundario · No FIFA oficial</div>
  </div>

</div>
<script>
const CFG = [
  {
    id:"argentina-algeria",
    title:"Argentina vs. Argelia",
    flags:"🇦🇷 vs 🇩🇿",
    meta:"16 Jun · Arrowhead Stadium, Kansas City · 9 PM ET",
    urls:{
      seatgeek:"https://seatgeek.com/fifa-world-cup-tickets/international-soccer/2026-06-16-8-pm/17196233",
      tickpick:"https://www.tickpick.com/buy-fifa-world-cup-26-group-j-argentina-vs-algeria-match-19-tickets-arrowhead-stadium-6-16-26-8pm/6259640/",
      gametime:"https://gametime.co/soccer/fifa-world-cup-argentina-vs-algeria-match-19-group-j-tickets/6-16-2026-kansas-city-mo-arrowhead-stadium/events/66ac27f8880867d8fb9ee65f",
      fifa:"https://www.fifa.com/en/tickets"
    }
  },
  {
    id:"argentina-austria",
    title:"Argentina vs. Austria",
    flags:"🇦🇷 vs 🇦🇹",
    meta:"22 Jun · AT&T Stadium, Dallas · 1 PM ET",
    urls:{
      seatgeek:"https://seatgeek.com/fifa-world-cup-tickets/international-soccer/2026-06-22-12-pm/17385144",
      tickpick:"https://www.tickpick.com/buy-world-cup-26-group-j-argentina-vs-austria-match-43-tickets-att-stadium-6-22-26-12pm/6259682/",
      gametime:"https://gametime.co/soccer/fifa-world-cup-argentina-vs-austria-match-43-group-j-tickets/6-22-2026-arlington-tx-att-stadium/events/66ac27f8880867d8fb9ee683",
      fifa:"https://www.fifa.com/en/tickets"
    }
  }
];

const $ = s => document.querySelector(s);
const fmt = (v,p="$") => v != null ? p+Number(v).toLocaleString("en-US",{maximumFractionDigits:0}) : "—";

function ago(str){
  if(!str) return "desconocido";
  const [dp,tp] = str.split(" ");
  const [d,m,y] = dp.split("/");
  const dt = new Date(`${y}-${m}-${d}T${tp}Z`);
  const diff = Math.floor((Date.now()-dt)/60000);
  if(diff<1)  return "hace menos de 1 min";
  if(diff<60) return `hace ${diff} min`;
  if(diff<1440) return `hace ${Math.floor(diff/60)}h ${diff%60}m`;
  return `hace ${Math.floor(diff/1440)} días`;
}

function badge(price){
  if(!price) return {cls:"badge-none",txt:"Sin datos"};
  if(price<700) return {cls:"badge-ok",txt:"Precio razonable"};
  if(price<1200) return {cls:"badge-warn",txt:"Precio alto"};
  return {cls:"badge-warn",txt:"Precio muy alto"};
}

function renderSources(state){
  const by = state.by_source || {};
  const sources = [
    {name:"SeatGeek", key:"SeatGeek", showCount:true},
    {name:"TickPick",  key:"TickPick",  showCount:false},
    {name:"Gametime",  key:"Gametime",  showCount:false},
  ].map(s => ({...s, ...(by[s.key] || {})}));

  // Solo mostrar fuentes que tienen precio
  const withPrice = sources.filter(s => s.min_price != null);
  if(!withPrice.length) return "";

  return `<div class="sources-grid">
    ${withPrice.map(s=>{
      const countLine = s.showCount && s.listing_count != null
        ? `<div class="source-count">${Number(s.listing_count).toLocaleString()} listings</div>`
        : "";
      return `<div class="source-card">
        <div>
          <div class="source-name">${s.name}</div>
          ${countLine}
        </div>
        <div class="source-price">${fmt(s.min_price)}</div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderHistory(h){
  if(!h||!h.length) return "";
  const items = [...h].reverse().slice(0,15).map((e,i,arr)=>{
    const prev = arr[i+1];
    let delta = "";
    if(e.min_price && prev?.min_price){
      const d = e.min_price - prev.min_price;
      if(d<0) delta = `<span class="dn">▼ $${Math.abs(d)}</span>`;
      else if(d>0) delta = `<span class="up">▲ $${d}</span>`;
    }
    return `<div class="history-item">
      <span class="history-time">${e.ts||""}</span>
      <span class="history-price">${fmt(e.min_price)} ${delta}</span>
      <span class="history-count">${e.listing_count!=null?e.listing_count.toLocaleString()+" listings":""}</span>
    </div>`;
  }).join("");
  return `<div class="history-section">
    <div class="history-label">Historial de precios</div>
    <div class="history-list">${items}</div>
  </div>`;
}

function renderMatch(cfg, state){
  const b = badge(state?.min_price);
  if(!state){
    return `<div class="match-card">
      <div class="match-header">
        <div><div class="match-title">${cfg.flags} ${cfg.title}</div><div class="match-meta">${cfg.meta}</div></div>
        <span class="match-badge badge-none">Sin datos aún</span>
      </div>
      <div class="status-card" style="padding:1.5rem;background:var(--surface2);">
        <div class="status-msg">El bot aún no registró datos. Corré el workflow manualmente en GitHub Actions.</div>
      </div>
    </div>`;
  }
  return `<div class="match-card">
    <div class="match-header">
      <div><div class="match-title">${cfg.flags} ${cfg.title}</div><div class="match-meta">${cfg.meta}</div></div>
      <span class="match-badge ${b.cls}">${b.txt}</span>
    </div>
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Precio mínimo</div>
        <div class="stat-value">${fmt(state.min_price)}</div>
        <div class="stat-sub">USD · mejor precio</div>
      </div>
      <div class="stat">
        <div class="stat-label">Precio promedio</div>
        <div class="stat-value blue">${fmt(state.avg_price)}</div>
        <div class="stat-sub">USD · todos los listings</div>
      </div>
      <div class="stat">
        <div class="stat-label">Fuentes activas</div>
        <div class="stat-value white">${Object.values(state.by_source||{}).filter(s=>s.min_price).length || "—"}</div>
        <div class="stat-sub">de 2 sitios monitoreados</div>
      </div>
      <div class="stat">
        <div class="stat-label">Último chequeo</div>
        <div class="stat-value white small">${ago(state.last_checked)}</div>
        <div class="stat-sub">${state.last_checked||"—"}</div>
      </div>
    </div>
    ${renderSources(state)}
    ${renderHistory(state.history)}
    <div class="card-footer">
      <a href="${cfg.urls.seatgeek}" target="_blank" class="btn btn-primary">SeatGeek →</a>
      <a href="${cfg.urls.tickpick}" target="_blank" class="btn btn-ghost">TickPick</a>
      <a href="${cfg.urls.gametime}" target="_blank" class="btn btn-ghost">Gametime</a>
      <a href="${cfg.urls.fifa}" target="_blank" class="btn btn-ghost">FIFA oficial</a>
    </div>
  </div>`;
}

function showError(msg){
  $("#root").innerHTML = `<div class="status-card">
    <div class="status-icon">⚠️</div>
    <div class="status-title">No se pudo cargar el estado</div>
    <div class="status-msg">${msg}</div>
  </div>`;
  $("#upd").textContent = "Error al cargar";
}

async function init(){
  try {
    const r = await fetch("ticket_state.json?t="+Date.now());
    if(!r.ok) throw new Error(`HTTP ${r.status} — el archivo ticket_state.json no existe aún en el repo o GitHub Pages no está activado.`);
    const state = await r.json();

    if(!state || Object.keys(state).length===0){
      showError(`El archivo <code>ticket_state.json</code> existe pero está vacío. Corré el workflow manualmente en GitHub Actions para que el bot haga el primer chequeo.`);
      return;
    }

    $("#root").innerHTML = CFG.map(c=>renderMatch(c, state[c.id]||null)).join("");

    const times = CFG.map(c=>state[c.id]?.last_checked).filter(Boolean);
    if(times.length) $("#upd").textContent = `Actualizado ${ago(times[times.length-1])}`;

  } catch(e){
    showError(`No se encontró <code>ticket_state.json</code>.<br><br>
      Causas posibles:<br>
      1. El workflow aún no corrió — andá a GitHub Actions y ejecutalo manualmente<br>
      2. El workflow no tiene el paso de <code>git push</code> — actualizá el <code>monitor.yml</code><br>
      3. GitHub Pages no está activado en el repo<br><br>
      <small style="opacity:.6">Detalle técnico: ${e.message}</small>`);
  }
}

init();
setInterval(init, 5*60*1000);
</script>
</body>
</html>
